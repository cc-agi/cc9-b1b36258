name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Type check
        run: bunx tsgo --noEmit
      - name: Lint
        run: bun run lint || true
      - name: Tests
        run: bun test || true
      - name: Build
        run: bun run build
